# f1-app-chart/templates/cronjob.yaml
{{- if .Values.cronjob.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Release.Name }}-cronjob
  namespace: {{ .Values.namespace }}
spec:
  schedule: "{{ .Values.cronjob.schedule }}"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: logger
            image: {{ .Values.image.busybox }}
            command:
            - /bin/sh
            - -c
            - |
              echo "========================================="
              echo "CronJob executed at $(date)"
              echo "Namespace: {{ .Values.namespace }}"
              echo "Release: {{ .Release.Name }}"
              echo "Environment: {{ .Values.config.LOG_LEVEL }}"
              echo "========================================="
          restartPolicy: OnFailure
{{- end }}