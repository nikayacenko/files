<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Management - Админ-панель</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="content">
        <h1>Панель-уведомлений F1</h1>
        <div class="nav">
            <a href="/home">Главная</a>
            <a href="/profile">Профиль</a>
            <a href="/notifications">Уведомления</a>
            <a href="/admin">Панель-уведомлений</a>
            <a href="/logout">Выход</a>
        </div>
        
        <div class="card" style="background: #ff5700; margin-bottom: 20px; padding: 25px;">
            <h3 style="color: white; text-align: center; margin-bottom: 20px;">Создать уведомление</h3>
            <form method="POST" action="/admin/create" class="admin-form">
                <div class="form-group">
                    <label style="color: white;">Заголовок</label>
                    <input type="text" name="title" placeholder="Например: Гран-при Монако" required>
                </div>
                <div class="form-group">
                    <label style="color: white;">Текст уведомления</label>
                    <textarea name="message" placeholder="Введите текст уведомления..." rows="4" required></textarea>
                </div>
                <button type="submit">Отправить уведомление</button>
            </form>
        </div>
        
        <div class="table-container">
            <h2 style="margin: 20px 0;">Существующие уведомления</h2>
            <table>
                <tr><th>ID</th><th>Заголовок</th><th>Сообщение</th><th>Дата</th><th>Действие</th></tr>
                {% for n in notifications %}
                <tr>
                    <td>{{ n.id }}</td>
                    <td><strong>{{ n.title }}</strong></td>
                    <td>{{ n.message }}</td>
                    <td>{{ n.date }}</td>
                    <td><a href="/admin/delete/{{ n.id }}" onclick="return confirm('Удалить?')" style="color: red;">Удалить</a></td>
                </tr>
                {% endfor %}
            </table>
        </div>
    </div>
</body>
</html>
